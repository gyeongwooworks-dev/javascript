<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1 class="text">Hello</h1>
    <button id="change">변경</button>

    <script>

        /*변경 버튼을 눌렀을 때,
            1) h1 태그의 텍스트 ->"Hello, JS"로 변경
            2) h1 태그의 색상 ->"red"로 변경
        */


        const h1 = document.querySelector(".text");
        const button = document.querySelector("#change");

        // flag 변수
        let ischanged = false;
        
        function changeH1() {
            if (ischanged) {
            h1.textContent = "Hello, JS";
            h1.style.color = "red";
            } else { //이미 한번 변경이 된 경우
            h1.textContent = "Hello";
            h1.style.color = "black";
            }
            ischanged = !ischanged
        };

        button.addEventListener("click", changeH1);
    </script>
</body>
</html>
